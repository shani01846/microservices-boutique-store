services:

  # ── Databases ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=Admin123!
      - SEQ_FIRSTRUN_ADMINEMAIL=admin@example.com
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=userservice;Username=admin;Password=password123
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=productservice
      - Redis__ConnectionString=redis:6379
      - Services__Inventory=http://inventory-service:8080
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5002:8080"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      inventory-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service-2:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    environment:
      - MongoDB__ConnectionString=mongodb://mongo:27017
      - MongoDB__DatabaseName=productservice
      - Redis__ConnectionString=redis:6379
      - Services__Inventory=http://inventory-service:8080
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5003:8080"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      inventory-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    environment:
      - Redis__ConnectionString=redis:6379
      - RabbitMQ__Host=rabbitmq
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    environment:
      - Redis__ConnectionString=redis:6379
      - Services__Inventory=http://inventory-service:8080
      - RabbitMQ__Host=rabbitmq
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=orderservice;Username=admin;Password=password123
      - Services__Cart=http://cart-service:8080
      - RabbitMQ__Host=rabbitmq
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      cart-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      - RabbitMQ__Host=rabbitmq
      - Brevo__SmtpKey=${BREVO_SMTP_KEY}
      - Brevo__SmtpLogin=${BREVO_SMTP_LOGIN}
      - Seq__ServerUrl=http://seq:80
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      - Jwt__SecretKey=MyVeryLongSecretKeyForJWTTokenGeneration123456789!
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - user-service
      - product-service
      - product-service-2
      - inventory-service
      - cart-service
      - order-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
        - NEXT_PUBLIC_EMAILJS_SERVICE_ID=service_1wu0ybr
        - NEXT_PUBLIC_EMAILJS_TEMPLATE_ID=template_otkucxx
        - NEXT_PUBLIC_EMAILJS_PUBLIC_KEY=Ak9jjK22aNr3ki00J
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
  redis_data:
